<section class="page-stack">
  <div class="page-heading">
    <div>
      <p class="eyebrow">Allocation</p>
      <h1 class="headline-lg">Analyse</h1>
      <p class="text-muted">Cohérence profil, allocation cible et stops ATR.</p>
    </div>
  </div>

  <div id="emptyAnalyse" class="empty-state hidden">
    <span class="material-symbols-outlined">analytics</span>
    <h2>Aucune position a analyser</h2>
    <p>Importe tes donnees ou cree un portefeuille depuis Inventaire.</p>
  </div>

  <div id="analyseContent" class="bento-grid">
    <article class="hero-card md:col-span-5">
      <p class="eyebrow">Score de coherence</p>
      <div id="scoreValue" class="metric-xl">0</div>
      <span id="scoreBadge" class="trend-pill neutral">A calculer</span>
      <p id="profileSummary" class="mt-4 text-muted"></p>
    </article>
    <article class="glass-panel md:col-span-7">
      <div class="section-title"><span class="material-symbols-outlined">compare_arrows</span>Allocation actuelle vs cible</div>
      <div id="allocationBars" class="list-stack"></div>
    </article>
    <article class="glass-panel md:col-span-6">
      <div class="section-title"><span class="material-symbols-outlined">swap_horiz</span>Reequilibrage</div>
      <div id="rebalanceList" class="list-stack"></div>
    </article>
    <article class="glass-panel md:col-span-6">
      <div class="section-title"><span class="material-symbols-outlined">shield</span>Stops ATR profil</div>
      <div id="stopList" class="list-stack"></div>
    </article>
  </div>
</section>

<script type="module">
  import { getVisiblePortfolios, totals, getSettings, money, pct } from './js/store.js';
  import { suggestedStop } from './js/data.js';

  function initAnalyse() {
    const portfolios = getVisiblePortfolios();
    const total = totals(portfolios);
    document.getElementById('emptyAnalyse').classList.toggle('hidden', total.positions.length > 0);
    document.getElementById('analyseContent').classList.toggle('hidden', total.positions.length === 0);
    if (!total.positions.length) return;

    const settings = getSettings();
    const profiles = settings.investorProfiles;
    const weighted = weightedProfileTarget(portfolios, total.value, profiles, settings.investorProfile);
    const profile = weighted.primaryProfile;
    const allocation = currentAllocation(total.positions, total.value);
    const deltas = Object.keys(weighted.target).map(key => Math.abs((allocation[key] || 0) - weighted.target[key]));
    const score = Math.max(0, Math.round(100 - deltas.reduce((sum, value) => sum + value, 0)));
    const label = score > 85 ? 'Optimal' : score > 70 ? 'Bon' : score > 50 ? 'A revoir' : 'Critique';

    document.getElementById('scoreValue').textContent = score;
    document.getElementById('scoreBadge').textContent = label;
    document.getElementById('scoreBadge').className = `signal-badge ${score > 70 ? 'watch' : score > 50 ? 'neutral' : 'sell'}`;
    document.getElementById('profileSummary').textContent = `${weighted.label} · objectif ${profile.objective} · horizon ${profile.horizon} · stop par defaut ${profile.atrMultiplier || 3}x ATR14.`;
    renderBars(allocation, weighted.target);
    renderRebalance(allocation, weighted.target, total.value, profile.etf);
    renderStops(total.positions);
  }

  function currentAllocation(positions, value) {
    const result = { Actions: 0, Obligations: 0, Liquidités: 0, Crypto: 0 };
    positions.forEach(position => {
      const key = result[position.assetClass] === undefined ? 'Actions' : position.assetClass;
      result[key] += value ? position.qty * position.currentPrice / value * 100 : 0;
    });
    return result;
  }

  function renderBars(actual, target) {
    document.getElementById('allocationBars').innerHTML = Object.keys(target).map(key => `
      <div class="allocation-row">
        <div class="allocation-label">${key}</div>
        <div class="allocation-bars">
          <div class="allocation-bar actual" style="width:${Math.min(actual[key] || 0, 100)}%"></div>
          <div class="allocation-bar target" style="width:${Math.min(target[key] || 0, 100)}%"></div>
        </div>
        <div class="allocation-values">${pct(actual[key] || 0)} / ${pct(target[key])}</div>
      </div>
    `).join('');
    document.getElementById('allocationBars').insertAdjacentHTML('afterbegin', `
      <div class="allocation-legend"><span><i class="actual"></i>Actuel</span><span><i class="target"></i>Cible</span></div>
    `);
  }

  function renderRebalance(actual, target, value, etf) {
    const rows = Object.keys(target).map(key => {
      const delta = target[key] - (actual[key] || 0);
      if (Math.abs(delta) < 3) return null;
      return `<div class="mini-card"><div><strong>${delta > 0 ? 'Renforcer' : 'Reduire'} ${key}</strong><span>${delta > 0 ? etf : 'positions les plus en gain'} · impact ${money(Math.abs(delta) / 100 * value)}</span></div><span class="${delta > 0 ? 'text-secondary' : 'text-error'}">${pct(delta)}</span></div>`;
    }).filter(Boolean);
    document.getElementById('rebalanceList').innerHTML = rows.length ? rows.join('') : `<p class="text-muted">Allocation proche de la cible.</p>`;
  }

  function renderStops(positions) {
    const rows = positions.map(position => {
      const stop = suggestedStop(position, position.profileId);
      return `<div class="mini-card"><div><strong>${position.name}</strong><span>${position.ticker} · ${position.accountName}</span></div><div class="text-right"><strong>${stop.atr ? money(stop.stop) : 'Historique requis'}</strong><span>${stop.multiplier}x ATR14</span></div></div>`;
    });
    document.getElementById('stopList').innerHTML = rows.join('');
  }

  function weightedProfileTarget(portfolios, totalValue, profiles, fallbackProfile) {
    const result = { Actions: 0, Obligations: 0, Liquidités: 0, Crypto: 0 };
    const profileIds = new Set();
    portfolios.forEach(portfolio => {
      const value = portfolio.positions.reduce((sum, position) => sum + position.qty * position.currentPrice, 0);
      const weight = totalValue ? value / totalValue : 1 / Math.max(portfolios.length, 1);
      const profileId = portfolio.profileId || fallbackProfile || 'equilibre';
      profileIds.add(profileId);
      const profile = profiles[profileId] || profiles.equilibre;
      Object.keys(result).forEach(key => { result[key] += (profile.target?.[key] || 0) * weight; });
    });
    const firstProfileId = profileIds.values().next().value || fallbackProfile || 'equilibre';
    const primaryProfile = profiles[firstProfileId] || profiles.equilibre;
    return {
      target: result,
      primaryProfile,
      label: profileIds.size > 1 ? `Cible ponderee (${profileIds.size} profils)` : primaryProfile.label
    };
  }

  initAnalyse();
</script>
