<!DOCTYPE html>
<html lang="fr" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AlphaTerminal — Pilotage Patrimonial</title>
    <meta name="description" content="Plateforme de gestion de portefeuille et signaux financiers">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#041627">

    <!-- PWA Icons -->
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- Tailwind CSS & Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#041627',
                        surface: '#f7f9ff',
                        secondary: '#3b6934',
                        error: '#ba1a1a',
                        'on-primary': '#ffffff',
                        'outline-variant': '#c4c6cd',
                        'surface-dark': '#0a1016',
                        'primary-container': '#d6e3ff',
                        'on-primary-container': '#001b3e'
                    },
                    borderRadius: {
                        'DEFAULT': '2px',
                        'lg': '4px',
                        'xl': '8px',
                        'full': '12px',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/app.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        [v-cloak] { display: none; }

        /* Glass effect */
        .glass {
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .dark .glass {
            background: linear-gradient(135deg, rgba(10,16,22,0.8), rgba(10,16,22,0.6));
        }

        /* Layout */
        body {
            background-color: #f7f9ff;
            color: #041627;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .dark body {
            background-color: #0a1016;
            color: #f7f9ff;
        }

        main {
            flex: 1;
            padding-top: 64px;
            padding-bottom: 80px;
        }
        @media (min-width: 768px) {
            main {
                padding-bottom: 24px;
                padding-left: 24px;
                padding-right: 24px;
            }
        }
    </style>
</head>
<body class="font-sans antialiased">

    <!-- Top App Bar -->
    <header class="fixed top-0 left-0 right-0 h-16 bg-primary text-white z-50 flex items-center justify-between px-4 md:px-10">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-2xl">terminal</span>
            <h1 class="text-xl font-bold tracking-tight uppercase">AlphaTerminal</h1>
        </div>

        <!-- Desktop Navigation -->
        <nav class="hidden md:flex items-center gap-6 mx-10">
            <a href="#/dashboard" class="nav-link flex items-center gap-1 opacity-80 hover:opacity-100 transition-opacity">
                <span class="material-symbols-outlined">dashboard</span> Dashboard
            </a>
            <a href="#/analyse" class="nav-link flex items-center gap-1 opacity-80 hover:opacity-100 transition-opacity">
                <span class="material-symbols-outlined">analytics</span> Analyse
            </a>
            <a href="#/signaux" class="nav-link flex items-center gap-1 opacity-80 hover:opacity-100 transition-opacity">
                <span class="material-symbols-outlined">bolt</span> Signaux
            </a>
            <a href="#/inventaire" class="nav-link flex items-center gap-1 opacity-80 hover:opacity-100 transition-opacity">
                <span class="material-symbols-outlined">list_alt</span> Inventaire
            </a>
        </nav>

        <div class="flex items-center gap-4">
            <!-- Account Selector -->
            <div class="relative group">
                <button id="accountSelector" class="flex items-center gap-2 bg-white/10 hover:bg-white/20 px-3 py-1.5 rounded-lg transition-colors">
                    <span id="activeAccountName" class="text-sm font-medium">Global</span>
                    <span class="material-symbols-outlined text-sm">expand_more</span>
                </button>
                <div id="accountDropdown" class="absolute right-0 mt-2 w-48 bg-white dark:bg-surface-dark text-black dark:text-white rounded-xl shadow-xl border border-outline-variant hidden">
                    <div class="p-2 flex flex-col gap-1" id="accountList">
                        <!-- Accounts populated by JS -->
                    </div>
                </div>
            </div>

            <!-- Notifications -->
            <button id="notifButton" class="relative p-2 hover:bg-white/10 rounded-full transition-colors">
                <span class="material-symbols-outlined">notifications</span>
                <span id="notifBadge" class="absolute top-1 right-1 w-2.5 h-2.5 bg-error rounded-full border-2 border-primary hidden"></span>
            </button>

            <!-- Theme Toggle -->
            <button id="themeToggle" class="p-2 hover:bg-white/10 rounded-full transition-colors">
                <span id="themeIcon" class="material-symbols-outlined">dark_mode</span>
            </button>
        </div>
    </header>

    <!-- Main Content Container (SPA) -->
    <main id="app-content" class="max-w-7xl mx-auto w-full px-4 md:px-0">
        <!-- Pages will be loaded here -->
        <div class="flex items-center justify-center h-full">
            <div class="animate-pulse text-primary dark:text-white opacity-50">Chargement...</div>
        </div>
    </main>

    <!-- Mobile Bottom Navigation -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-white dark:bg-surface-dark border-t border-outline-variant z-50 flex items-center justify-around px-2">
        <a href="#/dashboard" class="mobile-nav-link flex flex-col items-center gap-0.5 text-primary dark:text-white opacity-60">
            <span class="material-symbols-outlined">dashboard</span>
            <span class="text-[10px] font-bold uppercase">Dashboard</span>
        </a>
        <a href="#/analyse" class="mobile-nav-link flex flex-col items-center gap-0.5 text-primary dark:text-white opacity-60">
            <span class="material-symbols-outlined">analytics</span>
            <span class="text-[10px] font-bold uppercase">Analyse</span>
        </a>
        <a href="#/signaux" class="mobile-nav-link flex flex-col items-center gap-0.5 text-primary dark:text-white opacity-60">
            <span class="material-symbols-outlined">bolt</span>
            <span class="text-[10px] font-bold uppercase">Signaux</span>
        </a>
        <a href="#/inventaire" class="mobile-nav-link flex flex-col items-center gap-0.5 text-primary dark:text-white opacity-60">
            <span class="material-symbols-outlined">list_alt</span>
            <span class="text-[10px] font-bold uppercase">Inventaire</span>
        </a>
    </nav>

    <!-- Notifications Drawer -->
    <div id="notifDrawer" class="fixed inset-y-0 right-0 w-full md:w-96 bg-white dark:bg-surface-dark shadow-2xl z-[60] transform translate-x-full transition-transform duration-300 border-l border-outline-variant">
        <div class="h-16 flex items-center justify-between px-6 border-b border-outline-variant">
            <h2 class="text-lg font-bold">Alertes & Notifications</h2>
            <button id="closeNotif" class="p-2 hover:bg-black/5 dark:hover:bg-white/5 rounded-full">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div id="notifList" class="overflow-y-auto h-[calc(100%-64px)] p-4 flex flex-col gap-3">
            <!-- Notifications populated by JS -->
        </div>
    </div>
    <div id="notifOverlay" class="fixed inset-0 bg-black/50 z-[55] hidden"></div>

    <!-- Scripts -->
    <script type="module" src="js/store.js"></script>
    <script type="module" src="js/data.js"></script>
    <script type="module" src="js/charts.js"></script>
    <script type="module" src="js/notifications.js"></script>
    <script type="module" src="js/app.js"></script>

    <script>
        // Inline script to handle basic UI toggles that don't need the full module system immediately
        document.getElementById('accountSelector').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('accountDropdown').classList.toggle('hidden');
        });

        document.addEventListener('click', () => {
            document.getElementById('accountDropdown').classList.add('hidden');
        });

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Registered', reg))
                    .catch(err => console.error('SW Error', err));
            });
        }
    </script>
</body>
</html>
